<main class="flex-grow flex flex-col items-center justify-center px-container-margin py-xxl">
<!-- Onboarding Progress (Subtle indicator) -->
<div class="w-full max-w-[480px] mb-xl flex gap-xs">
<div class="h-1 flex-grow bg-primary rounded-full"></div>
<div class="h-1 flex-grow bg-surface-variant rounded-full"></div>
<div class="h-1 flex-grow bg-surface-variant rounded-full"></div>
</div>
<section class="w-full max-w-[480px] space-y-xl">
<div class="text-center md:text-left">
<h1 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface mb-sm">Let's get started</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Tell us a bit about yourself so we can personalize your culinary journey.</p>
</div>
<form class="space-y-md" id="onboardingForm">
<!-- Name Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-sm">FULL NAME</label>
<input class="w-full bg-surface p-md rounded-xl border-none focus:ring-2 focus:ring-primary font-body-lg text-body-lg transition-all placeholder:text-outline-variant" placeholder="e.g. Alex Rivera" type="text"/>
</div>
<!-- Bio Metrics Grid -->
<div class="grid grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-sm">HEIGHT (CM)</label>
<input class="w-full bg-surface p-md rounded-xl border-none focus:ring-2 focus:ring-primary font-body-lg text-body-lg transition-all placeholder:text-outline-variant" placeholder="175" type="number"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-sm">WEIGHT (KG)</label>
<input class="w-full bg-surface p-md rounded-xl border-none focus:ring-2 focus:ring-primary font-body-lg text-body-lg transition-all placeholder:text-outline-variant" placeholder="70" type="number"/>
</div>
</div>
<!-- Age & Sex Grid -->
<div class="grid grid-cols-2 gap-md">
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-sm">AGE</label>
<input class="w-full bg-surface p-md rounded-xl border-none focus:ring-2 focus:ring-primary font-body-lg text-body-lg transition-all placeholder:text-outline-variant" placeholder="28" type="number"/>
</div>
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant px-sm">SEX</label>
<div class="relative">
<select class="w-full appearance-none bg-surface p-md rounded-xl border-none focus:ring-2 focus:ring-primary font-body-lg text-body-lg transition-all text-on-surface cursor-pointer">
<option disabled="" selected="" value="">Select</option>
<option value="female">Female</option>
<option value="male">Male</option>
<option value="other">Other</option>
<option value="prefer_not_to_say">Prefer not to say</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
</div>
</div>
</div>
<!-- CTA -->
<div class="pt-lg">
<button class="w-full bg-primary text-on-primary font-title-lg text-title-lg py-md rounded-xl hover:opacity-90 active:scale-[0.98] transition-all soft-elevation flex items-center justify-center gap-sm" type="submit">
                        Next
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
</section>
</main>
<!-- Footer (Using Predicted Component Guidelines) -->
<footer class="w-full py-xl mt-xxl bg-surface-container-lowest border-t border-surface-variant">
<div class="max-w-[1200px] mx-auto px-container-margin flex flex-col md:flex-row justify-between items-center gap-md">
<span class="font-title-lg text-title-lg font-bold text-on-surface">Culina</span>
<div class="flex gap-lg">
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors hover:underline decoration-primary underline-offset-4" href="#">Privacy Policy</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors hover:underline decoration-primary underline-offset-4" href="#">Terms of Service</a>
<a class="font-body-sm text-body-sm text-on-surface-variant hover:text-primary transition-colors hover:underline decoration-primary underline-offset-4" href="#">Contact Support</a>
</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">© 2024 Culina Health. All rights reserved.</p>
</div>
</footer>
<script>
        document.getElementById('onboardingForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Subtle transition effect on submit
            this.style.opacity = '0.5';
            this.style.transform = 'translateY(-4px)';
            setTimeout(() => {
                alert('Success! Moving to the next step of your health journey.');
                this.style.opacity = '1';
                this.style.transform = 'translateY(0)';
            }, 500);
        });

        // Add micro-interaction for input fields
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.classList.add('transition-transform');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
