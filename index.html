<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Culina — Your Daily Cooking Plan</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "inverse-primary": "#78dc77",
            "secondary": "#b52330",
            "tertiary-container": "#f26f9d",
            "on-primary": "#ffffff",
            "outline-variant": "#becab9",
            "background": "#f5fbef",
            "tertiary": "#a63360",
            "primary-container": "#4caf50",
            "on-background": "#171d16",
            "surface-bright": "#f5fbef",
            "primary": "#006e1c",
            "surface-container-high": "#e4eade",
            "on-tertiary-container": "#690034",
            "surface-container-low": "#f0f6ea",
            "surface-variant": "#dee4d9",
            "error-container": "#ffdad6",
            "surface-container-lowest": "#ffffff",
            "outline": "#6f7a6b",
            "on-secondary": "#ffffff",
            "inverse-on-surface": "#edf3e7",
            "surface-container": "#eaf0e4",
            "on-surface-variant": "#3f4a3c",
            "surface-container-highest": "#dee4d9",
            "secondary-container": "#ff5a5f",
            "on-surface": "#171d16",
            "error": "#ba1a1a",
            "on-error-container": "#93000a",
            "inverse-surface": "#2c322a",
            "surface": "#f5fbef",
            "on-primary-container": "#003c0b"
          },
          borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
          spacing: {
            "gutter": "16px", "lg": "24px", "xl": "32px", "sm": "8px",
            "md": "16px", "xxl": "48px", "xs": "4px", "container-margin": "24px", "unit": "8px"
          },
          fontFamily: { sans: ["Inter", "sans-serif"] },
          fontSize: {
            "title-lg": ["20px", { lineHeight: "28px", fontWeight: "600" }],
            "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0.05em", fontWeight: "600" }],
            "headline-md": ["24px", { lineHeight: "32px", letterSpacing: "-0.01em", fontWeight: "600" }],
            "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
            "display-lg-mobile": ["32px", { lineHeight: "40px", letterSpacing: "-0.02em", fontWeight: "700" }],
            "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }]
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #171d16; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .soft-elevation { box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05); }
    .card-shadow { box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.06); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
